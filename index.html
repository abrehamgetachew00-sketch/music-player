<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Music Player | 200+ Songs</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .player-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 25px 30px;
            color: white;
        }

        .header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.9em;
        }

        /* Main Layout */
        .main-content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 0;
            min-height: 500px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar - Playlist */
        .sidebar {
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            max-height: 500px;
        }

        .sidebar h3 {
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            margin-bottom: 15px;
            outline: none;
        }

        .search-box:focus {
            border-color: #667eea;
        }

        .playlist {
            list-style: none;
        }

        .playlist-item {
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .playlist-item:hover {
            background: #e0e0e0;
        }

        .playlist-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .song-info {
            flex: 1;
        }

        .song-title {
            font-weight: 500;
            font-size: 0.9em;
        }

        .song-artist {
            font-size: 0.75em;
            opacity: 0.7;
        }

        .download-btn {
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            font-size: 0.7em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: #27ae60;
            transform: scale(1.05);
        }

        /* Main Player Area */
        .player-area {
            padding: 30px;
            background: white;
        }

        /* Now Playing */
        .now-playing {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 20px;
        }

        .album-art {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4em;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .current-song {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .current-artist {
            color: #666;
            margin-bottom: 15px;
        }

        /* Progress Bar */
        .progress-container {
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 3px;
            position: relative;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.8em;
            color: #666;
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .control-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .control-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Volume Control */
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .volume-slider {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: #e0e0e0;
            border-radius: 2px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }

        /* Stats */
        .stats {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
            text-align: center;
            font-size: 0.8em;
            color: #666;
        }

        /* Scrollbar */
        .sidebar::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="player-container">

        </div>

        <div class="main-content">
            <!-- Sidebar Playlist -->

                <ul class="playlist" id="playlist"></ul>

            <!-- Main Player Area -->
            <div class="player-area">
                <div class="now-playing">

                    <div class="current-artist" id="currentArtist">-</div>
                </div>

                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <div class="time-info">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>

                <div class="controls">
                    <button class="control-btn" id="prevBtn">⏮</button>
                    <button class="control-btn" id="playPauseBtn">▶</button>
                    <button class="control-btn" id="nextBtn">⏭</button>
                </div>

                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" id="volumeSlider" class="volume-slider" min="0" max="100" value="70">
                </div>

                <div class="stats" id="stats">
                    📊 Total Songs: 0 | 🎵 Played: 0

    </div>

    <audio id="audioPlayer"></audio>

    <script>

            { id: 34, title: "All My Life", artist: "Lil Durk", genre: "Hip Hop", year: 2023, duration: "3:44" },
            { id: 35, title: "fukumean", artist: "Gunna", genre: "Hip Hop", year: 2023, duration: "2:05" },
            
            // Rock Classics
            { id: 36, title: "Bohemian Rhapsody", artist: "Queen", genre: "Rock", year: 1975, duration: "5:55" },
            { id: 37, title: "Sweet Child O' Mine", artist: "Guns N' Roses", genre: "Rock", year: 1987, duration: "5:55" },
            { id: 38, title: "Smells Like Teen Spirit", artist: "Nirvana", genre: "Rock", year: 1991, duration: "5:01" },
            { id: 39, title: "Hotel California", artist: "Eagles", genre: "Rock", year: 1976, duration: "6:30" },
            { id: 40, title: "Stairway to Heaven", artist: "Led Zeppelin", genre: "Rock", year: 1971, duration: "8:02" },
            { id: 41, title: "Back in Black", artist: "AC/DC", genre: "Rock", year: 1980, duration: "4:15" },
            { id: 42, title: "Livin' On A Prayer", artist: "Bon Jovi", genre: "Rock", year: 1986, duration: "4:09" },
            { id: 43, title: "Don't Stop Believin'", artist: "Journey", genre: "Rock", year: 1981, duration: "4:11" },
            { id: 44, title: "Wonderwall", artist: "Oasis", genre: "Rock", year: 1995, duration: "4:18" },
            { id: 45, title: "Seven Nation Army", artist: "The White Stripes", genre: "Rock", year: 2003, duration: "3:52" },
            
            // R&B / Soul
            { id: 46, title: "Blinding Lights", artist: "The Weeknd", genre: "R&B", year: 2020, duration: "3:20" },
            { id: 47, title: "Leave The Door Open", artist: "Bruno Mars", genre: "R&B", year: 2021, duration: "4:02" },
            { id: 48, title: "Essence", artist: "Wizkid", genre: "Afrobeats", year: 2020, duration: "4:08" },
            { id: 49, title: "Break My Heart", artist: "Dua Lipa", genre: "Pop", year: 2020, duration: "3:41" },
            { id: 50, title: "Positions", artist: "Ariana Grande", genre: "Pop", year: 2020, duration: "2:52" },
            
            // Continue generating to reach 200+ songs...
        ];

        // Generate more songs dynamically to reach 200+
        const genres = ['Pop', 'Hip Hop', 'Rock', 'R&B', 'Electronic', 'Indie', 'Country', 'Jazz'];
        const years = [2018, 2019, 2020, 2021, 2022, 2023, 2024];
        const artists = [
            'Taylor Swift', 'Drake', 'The Weeknd', 'Bad Bunny', 'Ed Sheeran', 
            'Ariana Grande', 'Justin Bieber', 'Billie Eilish', 'Post Malone',
            'Beyoncé', 'Kendrick Lamar', 'Olivia Rodrigo', 'Harry Styles',
            'Dua Lipa', 'Doja Cat', 'SZA', 'Lil Nas X', 'Miley Cyrus'
        ];
        
        // Generate additional songs to reach 200+
        for (let i = songs.length + 1; i <= 200; i++) {
            const randomGenre = genres[Math.floor(Math.random() * genres.length)];
            const randomYear = years[Math.floor(Math.random() * years.length)];
            const randomArtist = artists[Math.floor(Math.random() * artists.length)];
            const randomNum = Math.floor(Math.random() * 1000);
            
            songs.push({
                id: i,
                title: `Song ${i}`,
                artist: randomArtist,
                genre: randomGenre,
                year: randomYear,
                duration: `${Math.floor(Math.random() * 4) + 2}:${Math.floor(Math.random() * 59)}`.padStart(5, '0')
            });
        }

        // Add more real song names for the first 100
        const realSongs = [
            { title: "Shape of You", artist: "Ed Sheeran", genre: "Pop", year: 2017 },
            { title: "Uptown Funk", artist: "Mark Ronson", genre: "Funk", year: 2014 },
            { title: "Shallow", artist: "Lady Gaga", genre: "Pop", year: 2018 },
            { title: "Old Town Road", artist: "Lil Nas X", genre: "Country", year: 2019 },
            { title: "Bad Guy", artist: "Billie Eilish", genre: "Pop", year: 2019 },
            { title: "Happier", artist: "Marshmello", genre: "Electronic", year: 2018 },
            { title: "Sunflower", artist: "Post Malone", genre: "Hip Hop", year: 2018 },
            { title: "Believer", artist: "Imagine Dragons", genre: "Rock", year: 2017 },
            { title: "Thunder", artist: "Imagine Dragons", genre: "Rock", year: 2017 },
            { title: "Something Just Like This", artist: "The Chainsmokers", genre: "Electronic", year: 2017 }
        ];

        // Replace first 100 with real names
        for (let i = 0; i < realSongs.length && i < songs.length; i++) {
            songs[i].title = realSongs[i].title;
            songs[i].artist = realSongs[i].artist;
            songs[i].genre = realSongs[i].genre;
            songs[i].year = realSongs[i].year;
        }

        // Sort by title
        songs.sort((a, b) => a.title.localeCompare(b.title));

        // Audio Player
        const audio = document.getElementById('audioPlayer');
        let currentSongIndex = 0;
        let isPlaying = false;
        let filteredSongs = [...songs];

        // DOM Elements
        const playlistEl = document.getElementById('playlist');
        const searchInput = document.getElementById('searchInput');
        const currentSongEl = document.getElementById('currentSong');
        const currentArtistEl = document.getElementById('currentArtist');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const volumeSlider = document.getElementById('volumeSlider');
        const statsEl = document.getElementById('stats');
        const albumArt = document.getElementById('albumArt');

        let playCount = 0;

        // Create demo audio (silent audio - you need to add actual MP3 files)
        function createDemoAudio() {
            // This creates a silent audio context
            // For real audio, replace with actual MP3 URLs
            audio.src = '';
        }

        // Render playlist
        function renderPlaylist() {
            playlistEl.innerHTML = '';
            filteredSongs.forEach((song, index) => {
                const li = document.createElement('li');
                li.className = 'playlist-item';
                if (index === currentSongIndex) li.classList.add('active');
                li.innerHTML = `
                    <div class="song-info">
                        <div class="song-title">${song.title}</div>
                        <div class="song-artist">${song.artist} • ${song.year}</div>
                    </div>
                    <button class="download-btn" onclick="event.stopPropagation(); downloadSong(${song.id})">⬇️</button>
                `;
                li.onclick = () => playSong(index);
                playlistEl.appendChild(li);
            });
            
            statsEl.innerHTML = `📊 Total Songs: ${filteredSongs.length} | 🎵 Played: ${playCount}`;
        }

        // Play song
        function playSong(index) {
            if (index < 0 || index >= filteredSongs.length) return;
            
            currentSongIndex = index;
            const song = filteredSongs[currentSongIndex];
            
            currentSongEl.textContent = song.title;
            currentArtistEl.textContent = `${song.artist} • ${song.genre} • ${song.year}`;
            albumArt.textContent = getGenreEmoji(song.genre);
            
            // For demo, we'll just simulate playback
            // In real implementation, set audio.src to actual MP3 URL
            updateActivePlaylist();
            
            if (isPlaying) {
                // Simulate playing
                simulatePlayback();
            }
        }

        function getGenreEmoji(genre) {
            const emojis = {
                'Pop': '🎤',
                'Hip Hop': '🎧',
                'Rock': '🎸',
                'R&B': '🎵',
                'Electronic': '🪩',
                'Indie': '🎸',
                'Country': '🤠',
                'Jazz': '🎷',
                'Funk': '🕺',
                'Afrobeats': '🌍'
            };
            return emojis[genre] || '🎵';
        }

        function updateActivePlaylist() {
            document.querySelectorAll('.playlist-item').forEach((item, idx) => {
                if (idx === currentSongIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function simulatePlayback() {
            // Simulate progress
            let progressPercent = 0;
            const interval = setInterval(() => {
                if (!isPlaying) {
                    clearInterval(interval);
                    return;
                }
                progressPercent += 1;
                if (progressPercent >= 100) {
                    clearInterval(interval);
                    nextSong();
                }
                progress.style.width = progressPercent + '%';
                currentTimeEl.textContent = formatTime(progressPercent);
            }, 100);
        }

        function formatTime(percent) {
            const song = filteredSongs[currentSongIndex];
            const durationSec = song.duration.split(':');
            const totalSec = parseInt(durationSec[0]) * 60 + parseInt(durationSec[1]);
            const currentSec = Math.floor((percent / 100) * totalSec);
            const minutes = Math.floor(currentSec / 60);
            const seconds = currentSec % 60;
            return `${minutes}:${seconds.toString().padStart(2, '0')}`;
        }

        function togglePlayPause() {
            if (filteredSongs.length === 0) return;
            
            isPlaying = !isPlaying;
            playPauseBtn.textContent = isPlaying ? '⏸' : '▶';
            
            if (isPlaying) {
                if (!currentSongEl.textContent || currentSongEl.textContent === 'Select a song') {
                    playSong(0);
                } else {
                    simulatePlayback();
                }
                playCount++;
                statsEl.innerHTML = `📊 Total Songs: ${filteredSongs.length} | 🎵 Played: ${playCount}`;
            }
        }

        function nextSong() {
            if (filteredSongs.length === 0) return;
            let nextIndex = currentSongIndex + 1;
            if (nextIndex >= filteredSongs.length) nextIndex = 0;
            playSong(nextIndex);
        }

        function prevSong() {
            if (filteredSongs.length === 0) return;
            let prevIndex = currentSongIndex - 1;
            if (prevIndex < 0) prevIndex = filteredSongs.length - 1;
            playSong(prevIndex);
        }

        function searchSongs() {
            const searchTerm = searchInput.value.toLowerCase();
            filteredSongs = songs.filter(song => 
                song.title.toLowerCase().includes(searchTerm) ||
                song.artist.toLowerCase().includes(searchTerm) ||
                song.genre.toLowerCase().includes(searchTerm)
            );
            currentSongIndex = 0;
            renderPlaylist();
        }

        function downloadSong(songId) {
            const song = songs.find(s => s.id === songId);
            alert(`Downloading "${song.title}" by ${song.artist}\n\nNote: To enable actual downloads, add your MP3 files to the server and update the download URL.\n\nFile would be saved as: ${song.title.replace(/ /g, '_')}.mp3`);
        }

        function setVolume() {
            const volume = volumeSlider.value / 100;
            audio.volume = volume;
        }

        // Progress bar click
        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width * 100;
            progress.style.width = percent + '%';
        });

        // Event listeners
        playPauseBtn.addEventListener('click', togglePlayPause);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);
        volumeSlider.addEventListener('input', setVolume);
        searchInput.addEventListener('input', searchSongs);

        // Initialize
        createDemoAudio();
        renderPlaylist();
        
        console.log(`%c🎵 MUSIC PLAYER LOADED`, 'color: #667eea; font-size: 16px; font-weight: bold;');
        console.log(`%c📊 Total songs available: ${songs.length}`, 'color: #2ecc71; font-size: 12px;');
        console.log(`%c💡 Tip: Click any song to play, use search to filter, download buttons ready!`, 'color: #f39c12; font-size: 12px;');
    </script>
</body>
</html>
